[build]
  command = "mkdir -p dist && cp -r images files index.html script.js styles.css favicon-96x96.png favicon.ico favicon.svg apple-touch-icon.png site.webmanifest web-app-manifest-192x192.png web-app-manifest-512x512.png dist/"
  publish = "dist"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
